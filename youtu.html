<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="yu과제용.css">
</head>
<body>
    <header>
        <div class="line">
            <img src="menu.png" class="icon">
        </div>
        <div class="logo">
        <img src="youtube.png" class="lologo">
        <div class="kr">
            <span id="country">KR</span>
        </div>
        </div>
        <div class="search">
            <div class="search-bar">
            <input type="text" placeholder="검색" class="bar">
            <img src="search.png" class="sicon">
            </div>
        </div>
        <div class="right"> 
            <div class="mic">
                <img src="mic.png" class="icon">
            </div>
            <div class="make">
                <img src="make.png" class="icon">
            </div>
        </div>
        <div class="login">
            <button class="login-button">
                <img src="user.png" class="icon">
                로그인
                </button>
        </div>
        
    </header>
    <div class="sidebar">

    <div class="menu-item">
        <img src="home.png" class="sicon">
        <span>홈</span>
    </div>

    <div class="menu-item">
        <img src="shorts.png" class="sicon">
        <span>shorts</span>
    </div>

    <div class="menu-item">
        <img src="sub.png" class="sicon">
        <span>구독</span>
    </div>

    <div class="menu-item">
        <img src="you.png" class="sicon">
        <span>내 페이지</span>
    </div>
    </div>
    <div class="main">
    <img src="v.png" class="video">
    </div>
</body>
</html>
